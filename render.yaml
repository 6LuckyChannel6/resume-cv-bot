services:
  - type: web
    name: resume-cv-bot
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
